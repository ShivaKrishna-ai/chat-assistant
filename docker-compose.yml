version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ./:/app
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
